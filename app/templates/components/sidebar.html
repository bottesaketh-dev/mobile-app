<div class="sidebar">
    <div class="text-center px-3 mb-4">
        <h4 class="brand-font text-white mb-0">
            <span class="text-saffron">BlueFox</span> Ledger
        </h4>
        <small class="text-muted text-uppercase tracking-wider">Restaurant Management</small>
    </div>
    
    <div class="nav flex-column">
        <!-- 1. Dashboard -->
        <a class="nav-link {% if request.blueprint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard.index') }}">
            <i class="fa-solid fa-gauge me-3"></i> Dashboard
        </a>
        
        <!-- 2. POS Billing -->
        <a class="nav-link {% if request.blueprint == 'billing' %}active{% endif %}" href="{{ url_for('billing.table_view') }}">
            <i class="fa-solid fa-cash-register me-3"></i> POS Billing
        </a>
        
        <!-- 3. AI Assistant (Command Center) -->
        <a class="nav-link {% if request.blueprint == 'chat' %}active{% endif %}" href="{{ url_for('chat.index') }}">
            <i class="fa-solid fa-robot text-saffron me-3"></i> AI Assistant
        </a>
        
        <!-- 3. Menu Catalog -->
        <a class="nav-link {% if request.blueprint == 'menu' %}active{% endif %}" href="{{ url_for('menu.menu_list') }}">
            <i class="fa-solid fa-book-open me-3"></i> Menu Catalog
        </a>
        
        <!-- 4. Staff Directory (Owner only) -->
        {% if current_user.role == 'owner' %}
            <a class="nav-link {% if request.blueprint == 'employees' %}active{% endif %}" href="{{ url_for('employees.employee_list') }}">
                <i class="fa-solid fa-users me-3"></i> Staff Directory
            </a>
            
            <!-- Branches (Owner only) -->
            <a class="nav-link {% if request.blueprint == 'branch' %}active{% endif %}" href="{{ url_for('branch.branch_list') }}">
                <i class="fa-solid fa-building me-3"></i> Branches
            </a>
        {% endif %}
        
        <!-- Outflows (Owner and Managers only) -->
        {% if current_user.role in ('owner', 'branch_manager') %}
            <!-- 5. Groceries -->
            <a class="nav-link {% if request.endpoint == 'expenses.grocery_list' or request.endpoint == 'expenses.add_grocery_purchase' or request.endpoint == 'expenses.add_grocery_item' %}active{% endif %}" href="{{ url_for('expenses.grocery_list') }}">
                <i class="fa-solid fa-basket-shopping me-3"></i> Groceries
            </a>
            
            <!-- 6. General Expenses -->
            <a class="nav-link {% if request.endpoint == 'expenses.expense_list' or request.endpoint == 'expenses.add_expense' or request.endpoint == 'expenses.expense_categories' %}active{% endif %}" href="{{ url_for('expenses.expense_list') }}">
                <i class="fa-solid fa-file-invoice-dollar me-3"></i> General Expenses
            </a>
            
            <!-- 7. Reports -->
            <a class="nav-link {% if request.blueprint == 'reports' %}active{% endif %}" href="{% if current_user.is_owner %}{{ url_for('reports.monthly_report') }}{% else %}{{ url_for('reports.daily_report') }}{% endif %}">
                <i class="fa-solid fa-chart-line me-3"></i> Reports
            </a>
            
        {% endif %}
    </div>
    
    <div style="position: absolute; bottom: 20px; width: 100%;" class="text-center px-3">
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-sm w-100 py-2">
            <i class="fa-solid fa-power-off me-2"></i> Log Out
        </a>
    </div>
</div>
