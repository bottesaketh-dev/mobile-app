{% extends "base.html" %}

{% block title %}Access Denied (403){% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 250px);">
    <div class="col-md-6 text-center">
        <div class="glass-card p-5 border-danger">
            <i class="fa-solid fa-ban text-danger display-1 mb-4"></i>
            <h1 class="brand-font display-4 mb-3">403 Forbidden</h1>
            <p class="text-muted fs-5 mb-4">You do not have the required permissions or credentials to access this management console view.</p>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-saffron px-4 py-2">
                <i class="fa-solid fa-house-user me-2"></i> Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
