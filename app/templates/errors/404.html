{% extends "base.html" %}

{% block title %}Page Not Found (404){% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 250px);">
    <div class="col-md-6 text-center">
        <div class="glass-card p-5">
            <i class="fa-solid fa-face-frown text-warning display-1 mb-4"></i>
            <h1 class="brand-font display-4 mb-3">404 Not Found</h1>
            <p class="text-muted fs-5 mb-4">The route path or record search you queried could not be found or has been moved.</p>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-saffron px-4 py-2">
                <i class="fa-solid fa-house-user me-2"></i> Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
