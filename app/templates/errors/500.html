{% extends "base.html" %}

{% block title %}System Error (500){% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 250px);">
    <div class="col-md-6 text-center">
        <div class="glass-card p-5 border-secondary">
            <i class="fa-solid fa-triangle-exclamation text-danger display-1 mb-4"></i>
            <h1 class="brand-font display-4 mb-3">500 Server Error</h1>
            <p class="text-muted fs-5 mb-4">The server encountered an internal configuration issue or database query problem.</p>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-saffron px-4 py-2">
                <i class="fa-solid fa-house-user me-2"></i> Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
